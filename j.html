<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meticula - Screenplay Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <style>
        /* =========================================
           GLOBAL VARIABLES & UI THEME
           ========================================= */
        :root {
            --bg-deep: #121212;
            --black-dark: #1a1a1a;      
            --black-light: #242424;     
            --grey-editor: #333333;       
            --grey-text: #a0a0a0;       
            --red-accent: #e50914; 
            --green-save: #28a745;     
            --white: #ffffff;
            --border-color: #333333;
            --font-ui: 'Segoe UI', system-ui, sans-serif;
            --font-script: 'Courier Prime', Courier, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-ui); background-color: var(--bg-deep); color: var(--white); height: 100vh; overflow: hidden; }

        /* SPA View Controller */
        .app-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; }
        .app-view.active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Buttons & Avatars */
        .btn-primary { padding: 8px 16px; background-color: var(--red-accent); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { opacity: 0.8; transform: scale(0.98); }
        .btn-save { background-color: var(--green-save); }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background-color: var(--red-accent); display: flex; justify-content: center; align-items: center; cursor: pointer; }

        /* Export Controls */
        .export-group { display: flex; align-items: center; background: #111; border: 1px solid var(--green-save); border-radius: 4px; overflow: hidden;}
        .export-select { background: #111; color: white; border: none; padding: 8px 12px; outline: none; cursor: pointer; font-family: var(--font-ui); font-weight: 500;}
        .export-btn { background: var(--green-save); color: white; border: none; padding: 8px 16px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .export-btn:hover { background: #218838; }

        /* =========================================
           DASHBOARD VIEW
           ========================================= */
        .topbar { height: 60px; background: var(--black-dark); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .main-layout { display: flex; flex: 1; }
        .sidebar { width: 250px; background: var(--black-dark); border-right: 1px solid var(--border-color); padding: 20px; }
        .content { flex: 1; padding: 40px; background: var(--bg-deep); }
        .project-card { background: var(--black-light); padding: 20px; border-radius: 8px; cursor: pointer; max-width: 600px; display: flex; align-items: center; gap: 15px; border: 1px solid transparent; transition: 0.2s; }
        .project-card:hover { border-color: var(--red-accent); transform: translateY(-2px); }

        /* =========================================
           SCRIPT EDITOR VIEW 
           ========================================= */
        .editor-layout { display: flex; flex-direction: column; height: 100vh; }
        
        .editor-header { height: 60px; background: var(--black-dark); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0;}
        .back-btn { background: none; border: none; color: var(--grey-text); cursor: pointer; font-size: 1rem; }
        .back-btn:hover { color: var(--white); }
        .header-actions { display: flex; gap: 15px; align-items: center; }

        /* Formatting Toolbar */
        .editor-toolbar { height: 50px; background: var(--black-light); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; gap: 15px; flex-shrink: 0;}
        .format-select { background: #111; color: white; border: 1px solid var(--grey-text); padding: 8px 12px; border-radius: 4px; outline: none; cursor: pointer; font-family: var(--font-ui); }
        
        /* Canvas (Holds all pages) */
        .editor-canvas { 
            flex: 1; 
            background-color: var(--grey-editor); 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 40px 20px; 
            gap: 40px; 
        }
        
        /* Individual Page Styles */
        .script-page {
            background-color: var(--white); color: #000;
            width: 8.5in; 
            height: 11in; /* STRICT US Letter Height */
            padding: 1in 1in 1in 1.5in; /* Standard Hollywood Margins */
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            font-family: var(--font-script);
            font-size: 12pt;
            line-height: 1.2;
            outline: none;
            overflow: hidden; 
            position: relative;
            flex-shrink: 0;
        }

        /* Page Numbering */
        .script-page::before {
            content: attr(data-page) ".";
            position: absolute;
            top: 0.5in;
            right: 1in;
            font-family: var(--font-script);
            font-size: 12pt;
            color: #666;
        }

        /* =========================================
           HOLLYWOOD SCREENPLAY CSS RULES
           ========================================= */
        .script-page p { margin: 0 0 1em 0; min-height: 1em; white-space: pre-wrap; outline: none; }
        .script-page p:empty::before { content: "\FEFF"; }

        .script-page p.scene { text-transform: uppercase; font-weight: bold; margin-top: 1.5em; }
        .script-page p.action { text-transform: none; }
        .script-page p.character { text-transform: uppercase; margin-left: 2.2in; margin-bottom: 0; }
        .script-page p.dialogue { margin-left: 1in; margin-right: 1.5in; margin-top: 0; }
        .script-page p.parenthetical { margin-left: 1.5in; margin-top: 0; margin-bottom: 0; }
        .script-page p.transition { text-align: right; text-transform: uppercase; margin-top: 1em; }

        .status-bar { height: 35px; background: var(--black-dark); border-top: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; color: var(--grey-text); font-size: 0.85rem; flex-shrink: 0;}

        /* Print Specific Styles for PDF Generation */
        @media print {
            .script-page { box-shadow: none; margin: 0; border: none; }
        }
    </style>
</head>
<body>

    <div id="dashboard-view" class="app-view active">
        <header class="topbar">
            <div style="font-weight: 900; letter-spacing: 1px;">METICULA</div>
            <div class="avatar">O</div>
        </header>
        <div class="main-layout">
            <aside class="sidebar">
                <h3 style="margin-bottom: 20px;">My Studio</h3>
                <p style="color: var(--red-accent); font-weight: bold;">Projects</p>
            </aside>
            <main class="content">
                <h2 style="margin-bottom: 30px; font-weight: 400;">Your Scripts</h2>
                <div class="project-card" onclick="openEditor()">
                    <div style="width: 40px; height: 40px; background: #6a1b9a; border-radius: 4px;"></div>
                    <div>
                        <h3 style="margin-bottom: 5px;">Postmartom</h3>
                        <p style="font-size: 0.8rem; color: var(--grey-text);">Click to open and edit script</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="editor-view" class="app-view">
        <div class="editor-layout">
            <header class="editor-header">
                <button class="back-btn" onclick="closeEditor()">&#10094; Back to Projects</button>
                <div style="font-weight: bold; font-size: 1.1rem;">Postmartom - Script</div>
                
                <div class="header-actions">
                    <div class="export-group">
                        <select id="exportFormat" class="export-select">
                            <option value="pdf">PDF (.pdf)</option>
                            <option value="txt">Text (.txt)</option>
                            <option value="html">Web (.html)</option>
                        </select>
                        <button class="export-btn" onclick="exportScript()">DOWNLOAD</button>
                    </div>
                    <button class="btn-primary">SHARE</button>
                </div>
            </header>

            <div class="editor-toolbar">
                <span style="color: var(--grey-text); font-size: 0.9rem;">Format:</span>
                <select id="formatSelector" class="format-select">
                    <option value="scene">Scene Heading</option>
                    <option value="action">Action</option>
                    <option value="character">Character</option>
                    <option value="dialogue">Dialogue</option>
                    <option value="parenthetical">Parenthetical</option>
                    <option value="transition">Transition</option>
                </select>
            </div>

            <div class="editor-canvas" id="pagesContainer">
                <div class="script-page" contenteditable="true" spellcheck="false" data-page="1" id="scriptPage1">
                    <p class="scene"><br></p>
                </div>
            </div>

            <div class="status-bar">
                <span id="saveStatus">Keep typing to auto-generate new pages!</span>
                <span id="pageCountDisplay">Total Pages: 1</span>
            </div>
        </div>
    </div>

    <script>
        // --- 1. VIEW SWITCHING LOGIC ---
        function openEditor() {
            document.getElementById('dashboard-view').classList.remove('active');
            document.getElementById('editor-view').classList.add('active');
            document.execCommand('defaultParagraphSeparator', false, 'p');
            document.querySelector('.script-page p').focus();
        }

        function closeEditor() {
            document.getElementById('editor-view').classList.remove('active');
            document.getElementById('dashboard-view').classList.add('active');
        }

        // --- 2. SCRIPT EDITOR & SMART ENTER LOGIC ---
        const pagesContainer = document.getElementById('pagesContainer');
        const formatSelector = document.getElementById('formatSelector');
        let totalPages = 1;

        function getCurrentParagraph() {
            let node = document.getSelection().anchorNode;
            if (!node) return null;
            while (node && node.nodeName !== 'P' && !node.classList?.contains('script-page')) {
                node = node.parentNode;
            }
            return (node && node.nodeName === 'P') ? node : null;
        }
        
        formatSelector.addEventListener('change', function() {
            const currentP = getCurrentParagraph();
            if (currentP) {
                currentP.className = this.value;
                currentP.focus();
            }
        });

        pagesContainer.addEventListener('keyup', updateToolbar);
        pagesContainer.addEventListener('click', updateToolbar);

        function updateToolbar() {
            const currentP = getCurrentParagraph();
            if (currentP && currentP.className) {
                if (Array.from(formatSelector.options).some(opt => opt.value === currentP.className)) {
                    formatSelector.value = currentP.className;
                }
            } else if (currentP && !currentP.className) {
                currentP.className = 'action';
                formatSelector.value = 'action';
            }
        }

        pagesContainer.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const currentP = getCurrentParagraph();
                if (!currentP) return;

                setTimeout(() => {
                    const newP = getCurrentParagraph();
                    if (!newP || newP === currentP) return;

                    // Smart Formatting Sequence
                    if (currentP.className === 'character') newP.className = 'dialogue';
                    else if (currentP.className === 'dialogue') newP.className = 'character';
                    else if (currentP.className === 'scene') newP.className = 'action';
                    else if (currentP.className === 'parenthetical') newP.className = 'dialogue';
                    else newP.className = 'action';
                    
                    updateToolbar();
                }, 10);
            }
        });

        // --- 3. AUTO PAGINATION LOGIC ---
        pagesContainer.addEventListener('input', function(e) {
            const activePage = e.target.closest('.script-page');
            if (!activePage) return;

            if (activePage.scrollHeight > activePage.clientHeight) {
                const overflowP = getCurrentParagraph();
                if (!overflowP) return;

                let nextPage = activePage.nextElementSibling;
                if (!nextPage) {
                    totalPages++;
                    nextPage = document.createElement('div');
                    nextPage.className = 'script-page';
                    nextPage.contentEditable = "true";
                    nextPage.spellcheck = false;
                    nextPage.setAttribute('data-page', totalPages);
                    pagesContainer.appendChild(nextPage);
                    document.getElementById('pageCountDisplay').innerText = `Total Pages: ${totalPages}`;
                }

                nextPage.prepend(overflowP);
                
                const range = document.createRange();
                const sel = window.getSelection();
                range.selectNodeContents(overflowP);
                range.collapse(false); 
                sel.removeAllRanges();
                sel.addRange(range);

                nextPage.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });

        // --- 4. EXPORT / DOWNLOAD LOGIC ---
        function exportScript() {
            const format = document.getElementById('exportFormat').value;
            const statusMsg = document.getElementById('saveStatus');
            const projectName = "Postmartom_Script";

            statusMsg.innerText = "Processing File... ⏳";

            if (format === 'txt') {
                saveAsTXT(projectName);
                showSuccessMessage(format);
            } else if (format === 'html') {
                saveAsHTML(projectName);
                showSuccessMessage(format);
            } else if (format === 'pdf') {
                saveAsPDF(projectName, format);
            }
        }

        function showSuccessMessage(format) {
            const statusMsg = document.getElementById('saveStatus');
            statusMsg.innerText = `Script Saved as ${format.toUpperCase()}! ✅`;
            statusMsg.style.color = "var(--green-save)";
            setTimeout(() => {
                statusMsg.innerText = "Keep typing to auto-generate new pages!";
                statusMsg.style.color = "var(--grey-text)";
            }, 3000);
        }

        // Export as TXT
        function saveAsTXT(filename) {
            const pages = document.querySelectorAll('.script-page');
            let scriptText = "TITLE: POSTMARTOM\n\n";

            pages.forEach((page, index) => {
                const paragraphs = page.querySelectorAll('p');
                paragraphs.forEach(p => {
                    const type = p.className;
                    let text = p.innerText.trim();
                    if(!text) return; 

                    if (type === 'character') scriptText += `\n          ${text.toUpperCase()}\n`;
                    else if (type === 'dialogue') scriptText += `     ${text}\n`;
                    else if (type === 'parenthetical') scriptText += `        (${text})\n`;
                    else if (type === 'scene') scriptText += `\n${text.toUpperCase()}\n\n`;
                    else if (type === 'transition') scriptText += `\n                                      ${text.toUpperCase()}\n\n`;
                    else scriptText += `${text}\n\n`;
                });
                scriptText += `\n================ Page ${index + 1} ================\n\n`;
            });

            downloadFile(scriptText, `${filename}.txt`, 'text/plain');
        }

        // Export as HTML (Offline Viewer)
        function saveAsHTML(filename) {
            const css = document.querySelector('style').innerText;
            // Get exact HTML content of pages
            let pagesHTML = "";
            document.querySelectorAll('.script-page').forEach(page => {
                pagesHTML += `<div class="script-page">${page.innerHTML}</div>`;
            });

            const htmlContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>${filename}</title>
                    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
                    <style>
                        body { background: #333; display: flex; flex-direction: column; align-items: center; padding: 40px 0; gap: 40px;}
                        ${css}
                    </style>
                </head>
                <body>${pagesHTML}</body>
                </html>
            `;
            downloadFile(htmlContent, `${filename}.html`, 'text/html');
        }

        // Export as PDF (Using HTML2PDF Library)
        function saveAsPDF(filename, format) {
            // Create a temporary container without gaps/scrolls for perfect PDF generation
            const element = document.createElement('div');
            document.querySelectorAll('.script-page').forEach(page => {
                const clone = page.cloneNode(true);
                clone.style.boxShadow = 'none'; // remove shadow for PDF
                clone.style.margin = '0';
                element.appendChild(clone);
            });

            const opt = {
                margin:       0,
                filename:     `${filename}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            // Generate PDF
            html2pdf().set(opt).from(element).save().then(() => {
                showSuccessMessage(format);
            });
        }

        // Helper function to trigger download
        function downloadFile(content, fileName, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

    </script>
</body>
</html>
